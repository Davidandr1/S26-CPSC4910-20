<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title or "Incentive App" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { padding: 14px 18px; border-bottom: 1px solid #ddd; display: flex; gap: 14px; align-items: center; }
    header a { text-decoration: none; color: #0366d6; }
    header .spacer { flex: 1; }
    main { padding: 24px; max-width: 820px; }
    .error { color: #b00020; margin: 10px 0; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, select { width: 100%; padding: 10px; margin-top: 6px; }
    button { margin-top: 16px; padding: 10px 14px; }
    .field-error { color: #b00020; margin-top: 6px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-top: 16px; }
  </style>
</head>
<body>
  <header>
    <strong>Incentive App</strong>

    {% if logged_in %}
      {% for item in nav_pages %}
        {% if item[0] == "about" %}
          <a href="/about">About</a>
        {% else %}
          <a href="/page/{{ item[2] }}">{{ item[1] }}</a>
        {% endif %}
      {% endfor %}
      <div class="spacer"></div>
      <a href="/logout">Logout</a>
    {% else %}
      <div class="spacer"></div>
      <a href="/">Login</a>
      <a href="/register">Create Account</a>
    {% endif %}
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
